        </nav>
        <div class="nav-social" aria-label="Social media links">
          <a href="#" data-href="site_instagram" aria-label="Instagram" title="Instagram" class="social-icon insta">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
              <circle cx="12" cy="12" r="4.2"></circle>

          </a>
          <a href="#" data-href="site_pinterest" aria-label="Pinterest" title="Pinterest" class="social-icon pin">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path
                d="M12 7.5c-2 0-3.5 1.4-3.5 3.4 0 1.4.8 2.3 2 2.3.4 0 .8-.2.9-.6l.3-1.1c.1-.4.1-.5-.1-.8-.2-.2-.3-.5-.3-.9 0-.8.6-1.4 1.5-1.4 1 0 1.6.7 1.6 1.8 0 1.7-1 2.9-2.4 2.9-.4 0-.7-.1-1-.3l-.4 1.5-.1.4"
                fill="none"
                stroke-width="1.4"
              ></path>
            </svg>
          </a>
          <a href="#" aria-label="YouTube (coming soon)" title="YouTube" class="social-icon yt">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="7" width="18" height="10" rx="3" ry="3"></rect>
              <polygon points="11 10 15 12 11 14"></polygon>
            </svg>
          </a>
          <a href="mailto:contact@beiaibaking.com" data-mailto="site_email" aria-label="Email" title="Email" class="social-icon mail">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="6" width="18" height="12" rx="2" ry="2"></rect>
              <polyline points="4 7 12 12 20 7" fill="none" stroke-width="1.6"></polyline>
            </svg>

        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="category-hero">
      <div class="container">
        <p class="hero-label">Decorated Cakes</p>
        <h1>Decorated Cakes Gallery</h1>
        <div class="subcategory-tabs">
          <button type="button" class="subcategory-tab active" data-subcategory="floral">Floral Cakes</button>
          <button type="button" class="subcategory-tab" data-subcategory="animal">Animal Cakes</button>
          <button type="button" class="subcategory-tab" data-subcategory="character">Character Cakes</button>
        </div>
      </div>
    </section>

    <section class="container category-section">
      <!-- 花卉蛋糕 Floral Cakes -->
      <div class="subcategory-block is-active" data-subcategory-block="floral">
        <h2 class="subcategory-title">Floral Cakes</h2>
        <div class="category-grid">
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-01.jpg" alt="Floral buttercream cake" />
          <figcaption>Floral buttercream cake</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-02.jpg" alt="Pastel celebration cake" />
          <figcaption>Pastel celebration cake</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-03.jpg" alt="Romantic wedding cake" />
          <figcaption>Romantic wedding cake</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-04.jpg" alt="Rose bouquet cake" />
          <figcaption>Rose bouquet cake</figcaption>
        </figure>
        </div>
      </div>

      <!-- 动物蛋糕 Animal Cakes -->
      <div class="subcategory-block" data-subcategory-block="animal">
        <h2 class="subcategory-title">Animal Cakes</h2>
        <div class="category-grid">
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-05.jpg" alt="Animal cake 1" />
          <figcaption>Animal cake 1</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-06.jpg" alt="Animal cake 2" />
          <figcaption>Animal cake 2</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-07.jpg" alt="Animal cake 3" />
          <figcaption>Animal cake 3</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-08.jpg" alt="Animal cake 4" />
          <figcaption>Animal cake 4</figcaption>
        </figure>
        </div>
      </div>

      <!-- 人物蛋糕 Character Cakes -->
      <div class="subcategory-block" data-subcategory-block="character">
        <h2 class="subcategory-title">Character Cakes</h2>
        <div class="category-grid">
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-09.jpg" alt="Character cake 1" />
          <figcaption>Character cake 1</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-10.jpg" alt="Character cake 2" />
          <figcaption>Character cake 2</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-11.jpg" alt="Character cake 3" />
          <figcaption>Character cake 3</figcaption>
        </figure>
        <figure class="category-item">
          <img class="thumb-image" src="assets/images/decorated-cakes/dec-12.jpg" alt="Character cake 4" />
          <figcaption>Character cake 4</figcaption>
        </figure>
        </div>
      </div>
      </div>
    </section>
