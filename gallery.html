<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cake Gallery | Beiai Baking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/images/logo.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/assets/images/logo.png" />
  <meta name="description" content="Explore cake and pastry categories by Beiai Baking." />
  <!-- Fonts (similar to reference site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="gallery-page">
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html" aria-label="Beiai Baking home">
        <img class="logo-img" src="assets/images/logo.png" alt="Beiai Baking logo" />
        <span class="logo-text">Beiai Baking</span>
      </a>
      <div class="header-right">
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="gallery.html" class="active">Cake Gallery</a>
          <a href="blog.html">Share</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="nav-social" aria-label="Social media links">
          <a href="#" data-href="site_instagram" aria-label="Instagram" title="Instagram" class="social-icon insta">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
              <circle cx="12" cy="12" r="4.2"></circle>
              <circle cx="17.2" cy="6.8" r="1.2"></circle>
            </svg>
          </a>
          <a href="#" data-href="site_pinterest" aria-label="Pinterest" title="Pinterest" class="social-icon pin">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 7.5c-2 0-3.5 1.4-3.5 3.4 0 1.4.8 2.3 2 2.3.4 0 .8-.2.9-.6l.3-1.1c.1-.4.1-.5-.1-.8-.2-.2-.3-.5-.3-.9 0-.8.6-1.4 1.5-1.4 1 0 1.6.7 1.6 1.8 0 1.7-1 2.9-2.4 2.9-.4 0-.7-.1-1-.3l-.4 1.5-.1.4" fill="none" stroke-width="1.4"></path>
            </svg>
          </a>
          <a href="#" data-href="site_youtube" aria-label="YouTube" title="YouTube" class="social-icon yt">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="7" width="18" height="10" rx="3" ry="3"></rect>
              <polygon points="11 10 15 12 11 14"></polygon>
            </svg>
          </a>
          <a href="contact.html" data-contact-link aria-label="Contact" title="Contact" class="social-icon mail">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="6" width="18" height="12" rx="2" ry="2"></rect>
              <polyline points="4 7 12 12 20 7" fill="none" stroke-width="1.6"></polyline>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="category-hero">
      <div class="container">
        <div class="gallery-hero-banner">
          <img data-content="banner_image" src="assets/images/french-pastries/fp-05.jpg" alt="Cake and pastry selection" onerror="this.style.display='none'" />
        </div>
        <div class="category-tabs">
          <div class="category-tab-wrap category-tab-dropdown">
            <button type="button" class="category-tab active" data-category="decorated">Decorated Cakes</button>
            <div class="category-tab-dropdown-menu" aria-hidden="true">
              <a href="gallery.html?category=decorated&sub=decorated-floral">Floral Cakes</a>
              <a href="gallery.html?category=decorated&sub=decorated-animal">Animal Cakes</a>
              <a href="gallery.html?category=decorated&sub=decorated-character">Character Cakes</a>
            </div>
          </div>
          <div class="category-tab-wrap category-tab-dropdown">
            <button type="button" class="category-tab" data-category="fondant">Fondant Cakes</button>
            <div class="category-tab-dropdown-menu" aria-hidden="true">
              <a href="gallery.html?category=fondant&sub=wedding">Wedding Cakes</a>
              <a href="gallery.html?category=fondant&sub=character">Character Cakes</a>
            </div>
          </div>
          <div class="category-tab-wrap category-tab-dropdown">
            <button type="button" class="category-tab" data-category="french">French Pastries</button>
            <div class="category-tab-dropdown-menu" aria-hidden="true">
              <a href="gallery.html?category=french&sub=mirror">Mirror Glaze Cakes</a>
              <a href="gallery.html?category=french&sub=macarons">Macarons</a>
              <a href="gallery.html?category=french&sub=assorted">Assorted</a>
            </div>
          </div>
          <button type="button" class="category-tab" data-category="cookies">Iced Cookies</button>
        </div>
      </div>
    </section>

    <!-- 每个分类一块区域，通过按钮切换显示 -->
    <section class="container category-section is-active" data-category-section="decorated">
      <!-- 默认：全部 Decorated Cakes（floral + animal + character） -->
      <div class="subcategory-block is-active" data-subcategory-block="decorated-all">
        <div class="category-grid" data-gallery-api="decorated"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="decorated-floral">
        <div class="category-grid" data-gallery-api="decorated" data-gallery-sub="decorated-floral"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="decorated-animal">
        <div class="category-grid" data-gallery-api="decorated" data-gallery-sub="decorated-animal"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="decorated-character">
        <div class="category-grid" data-gallery-api="decorated" data-gallery-sub="decorated-character"></div>
      </div>
    </section>

    <section class="container category-section" data-category-section="fondant">
      <div class="subcategory-block is-active" data-subcategory-block="fondant-all">
        <div class="category-grid" data-gallery-api="fondant"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="wedding">
        <div class="category-grid" data-gallery-api="fondant" data-gallery-sub="wedding"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="character">
        <div class="category-grid" data-gallery-api="fondant" data-gallery-sub="character"></div>
      </div>
    </section>

    <section class="container category-section" data-category-section="french">
      <div class="subcategory-block is-active" data-subcategory-block="french-all">
        <div class="category-grid" data-gallery-api="french"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="mirror">
        <div class="category-grid" data-gallery-api="french" data-gallery-sub="mirror"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="macarons">
        <div class="category-grid" data-gallery-api="french" data-gallery-sub="macarons"></div>
      </div>
      <div class="subcategory-block" data-subcategory-block="assorted">
        <div class="category-grid" data-gallery-api="french" data-gallery-sub="assorted"></div>
      </div>
    </section>

    <section class="container category-section" data-category-section="cookies">
      <div class="category-grid" data-gallery-api="cookies"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <nav class="footer-nav-rows" aria-label="Footer">
          <div class="footer-nav-line--top">
            <span class="footer-dpref">
              <a href="index.html">Home</a><span class="footer-sep">|</span>
            </span>
            <span class="footer-dmain">
              <a href="gallery.html">Cake Gallery</a><span class="footer-sep">|</span><a href="blog.html">Share</a>
            </span>
          </div>
          <span class="footer-dpref footer-dpref--spacer" aria-hidden="true"></span>
          <span class="footer-dmain footer-dmain--bottom">
            <a href="about.html">About</a><span class="footer-sep">|</span><a href="contact.html">Contact</a>
          </span>
        </nav>
      </div>
      <div class="footer-center">
        <a class="footer-logo" href="index.html" aria-label="Beiai Baking home">
          <img class="footer-logo-img" src="assets/images/logo.png" alt="Beiai Baking" />
        </a>
      </div>
      <div class="footer-right">
        <p class="footer-line">© <span id="year"></span> Beiai Baking. All rights reserved.</p>
        <p class="footer-line footer-line-indent">
          <a href="privacy-policy.html">Privacy Policy</a>
          <span class="footer-sep">|</span>
          <a href="terms-of-use.html">Terms of Use</a>
        </p>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/cms.js"></script>
</body>
</html>
