<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Share | Beiai Baking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="News, recipes and stories from Beiai Baking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .share-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .share-tab { padding: 0.5rem 1.25rem; border: 1px solid var(--border-color); border-radius: 6px; background: #fff; cursor: pointer; font-family: var(--font-body); font-size: 0.95rem; color: var(--text-light); transition: var(--transition); }
    .share-tab:hover { color: var(--primary-color); border-color: var(--primary-light); }
    .share-tab.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
    .share-list { list-style: none; padding: 0; margin: 0; }
    .share-list li { padding: 1rem 0; border-bottom: 1px solid var(--border-color); }
    .share-list li:last-child { border-bottom: none; }
    .share-list a { display: block; }
    .share-list .post-title { font-family: var(--font-heading); font-size: 1.1rem; margin-bottom: 0.25rem; }
    .share-list .post-date { font-size: 0.85rem; color: var(--text-muted); }
    .share-empty { color: var(--text-muted); padding: 2rem 0; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html" aria-label="Beiai Baking home">
        <img class="logo-img" src="assets/images/logo.png" alt="Beiai Baking logo" />
        <span class="logo-text">Beiai Baking</span>
      </a>
      <div class="header-right">
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="gallery.html">Cake Gallery</a>
          <a href="blog.html" class="active">Share</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="nav-social" aria-label="Social media links">
          <a href="#" data-href="site_instagram" aria-label="Instagram" title="Instagram" class="social-icon insta">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.2" cy="6.8" r="1.2"></circle></svg>
          </a>
          <a href="#" data-href="site_pinterest" aria-label="Pinterest" title="Pinterest" class="social-icon pin">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 7.5c-2 0-3.5 1.4-3.5 3.4 0 1.4.8 2.3 2 2.3.4 0 .8-.2.9-.6l.3-1.1c.1-.4.1-.5-.1-.8-.2-.2-.3-.5-.3-.9 0-.8.6-1.4 1.5-1.4 1 0 1.6.7 1.6 1.8 0 1.7-1 2.9-2.4 2.9-.4 0-.7-.1-1-.3l-.4 1.5-.1.4" fill="none" stroke-width="1.4"></path></svg>
          </a>
          <a href="#" data-href="site_youtube" aria-label="YouTube" title="YouTube" class="social-icon yt">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="7" width="18" height="10" rx="3" ry="3"></rect><polygon points="11 10 15 12 11 14"></polygon></svg>
          </a>
          <a href="mailto:contact@beiaibaking.com" data-mailto="site_email" aria-label="Email" title="Email" class="social-icon mail">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="2" ry="2"></rect><polyline points="4 7 12 12 20 7" fill="none" stroke-width="1.6"></polyline></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="container" style="padding: 48px 2rem 64px;">
      <h1>Share</h1>
      <div class="share-tabs">
        <button type="button" class="share-tab active" data-type="news">News</button>
        <button type="button" class="share-tab" data-type="recipe">Recipes</button>
        <button type="button" class="share-tab" data-type="blog">Blog</button>
      </div>
      <div id="shareContent">
        <ul class="share-list" id="shareList"></ul>
        <p class="share-empty" id="shareEmpty" style="display:none">No posts yet.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p class="footer-line">
          <a href="index.html">Home</a>
          <span class="footer-sep">|</span>
          <a href="gallery.html">Cake Gallery</a>
          <span class="footer-sep">|</span>
          <a href="blog.html">Share</a>
          <span class="footer-sep">|</span>
          <a href="about.html">About</a>
          <span class="footer-sep">|</span>
          <a href="contact.html">Contact</a>
        </p>
      </div>
      <div class="footer-center">
        <a class="footer-logo" href="index.html" aria-label="Beiai Baking home">
          <img class="footer-logo-img" src="assets/images/logo.png" alt="Beiai Baking" />
        </a>
      </div>
      <div class="footer-right">
        <p class="footer-line">© <span id="year"></span> Beiai Baking. All rights reserved.</p>
        <p class="footer-line footer-line-indent">
          <a href="privacy-policy.html">Privacy Policy</a>
          <span class="footer-sep">|</span>
          <a href="terms-of-use.html">Terms of Use</a>
        </p>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/cms.js"></script>
  <script>
  (function() {
    var listEl = document.getElementById('shareList');
    var emptyEl = document.getElementById('shareEmpty');
    var tabs = document.querySelectorAll('.share-tab');
    var currentType = 'news';

    function formatDate(d) {
      try {
        return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (e) { return ''; }
    }

    function loadPosts(type) {
      var url = '/api/posts?published=true';
      if (type) url += '&type=' + encodeURIComponent(type);
      fetch(url)
        .then(function(r) { return r.ok ? r.json() : []; })
        .then(function(rows) {
          listEl.innerHTML = (rows || []).map(function(p) {
            var href = 'post.html?slug=' + encodeURIComponent(p.slug || '');
            return '<li><a href="' + href + '"><span class="post-title">' + (p.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span><span class="post-date">' + formatDate(p.created_at) + '</span></a></li>';
          }).join('');
          listEl.style.display = (rows && rows.length) ? '' : 'none';
          emptyEl.style.display = (rows && rows.length) ? 'none' : 'block';
        })
        .catch(function() {
          listEl.innerHTML = '';
          listEl.style.display = 'none';
          emptyEl.style.display = 'block';
        });
    }

    function activateTab(type) {
      currentType = type;
      tabs.forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-type') === type);
      });
      loadPosts(type);
    }

    var params = new URLSearchParams(window.location.search);
    var initialType = params.get('type') || 'news';
    if (['news', 'recipe', 'blog'].indexOf(initialType) >= 0) {
      activateTab(initialType);
    } else {
      activateTab('news');
    }

    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        var type = tab.getAttribute('data-type');
        activateTab(type);
        var url = window.location.pathname + '?type=' + type;
        if (window.location.search !== '?type=' + type) {
          window.history.replaceState({}, '', url);
        }
      });
    });
  })();
  </script>
</body>
</html>
