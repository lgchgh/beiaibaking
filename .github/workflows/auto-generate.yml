name: Auto Generate Posts

on:
  schedule:
    # Sunday 02:00 UTC — generate 3 drafts for the week starting next Monday 00:00 UTC
    - cron: '0 2 * * 0'

  workflow_dispatch:
    inputs:
      bulk:
        description: 'Generate 6 months of historical posts?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      model:
        description: 'AI model to use'
        required: false
        default: 'deepseek'
        type: choice
        options:
          - deepseek
          - gemini

concurrency:
  group: auto-generate
  cancel-in-progress: true

jobs:
  generate:
    name: Generate baking content
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install openai --no-package-lock

      - name: Run weekly generation
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.bulk != 'true')
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY:   ${{ secrets.TAVILY_API_KEY }}
          BEIAI_API_URL:    ${{ secrets.BEIAI_API_URL }}
          CRON_SECRET:      ${{ secrets.CRON_SECRET }}
          AI_MODEL:         ${{ github.event_name == 'workflow_dispatch' && inputs.model || 'deepseek' }}
        run: |
          node scripts/auto-generate.js --model=$AI_MODEL

      - name: Run bulk historical generation
        if: github.event_name == 'workflow_dispatch' && inputs.bulk == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY:   ${{ secrets.TAVILY_API_KEY }}
          BEIAI_API_URL:    ${{ secrets.BEIAI_API_URL }}
          CRON_SECRET:      ${{ secrets.CRON_SECRET }}
          AI_MODEL:         ${{ inputs.model || 'deepseek' }}
        run: |
          node scripts/auto-generate.js --bulk --model=$AI_MODEL
