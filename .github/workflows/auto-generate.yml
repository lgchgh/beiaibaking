name: Auto Generate Posts

on:
  # Weekly: every Monday at 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'

  # Manual trigger — add --bulk flag for historical fill
  workflow_dispatch:
    inputs:
      bulk:
        description: 'Generate 6 months of historical posts (36 articles)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Prevent concurrent runs — if a previous run is still going, cancel it
concurrency:
  group: auto-generate
  cancel-in-progress: true

jobs:
  generate:
    name: Generate baking content
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install openai

      - name: Run weekly generation
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.bulk != 'true')
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BEIAI_API_URL: ${{ secrets.BEIAI_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/auto-generate.js

      - name: Run bulk historical generation
        if: github.event_name == 'workflow_dispatch' && inputs.bulk == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BEIAI_API_URL: ${{ secrets.BEIAI_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/auto-generate.js --bulk
