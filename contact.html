  <link rel="apple-touch-icon" href="/assets/images/logo.png" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

    <div class="container header-inner">
      <a class="logo" href="index.html" aria-label="Beiai Baking home">
        <img class="logo-img" src="assets/images/logo.png" alt="Beiai Baking logo" />
        <span class="logo-text">Beiai Baking</span>
      </a>
      <div class="header-right">
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="gallery.html">Cake Gallery</a>
          <a href="blog.html">Share</a>
          <a href="about.html">About</a>
          <a href="contact.html" class="active">Contact</a>
        </nav>
        <div class="nav-social" aria-label="Social media links">
          <a href="#" data-href="site_instagram" aria-label="Instagram" title="Instagram" class="social-icon insta">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
              <circle cx="12" cy="12" r="4.2"></circle>
              <circle cx="17.2" cy="6.8" r="1.2"></circle>
            </svg>
          </a>
          <a href="#" data-href="site_pinterest" aria-label="Pinterest" title="Pinterest" class="social-icon pin">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 7.5c-2 0-3.5 1.4-3.5 3.4 0 1.4.8 2.3 2 2.3.4 0 .8-.2.9-.6l.3-1.1c.1-.4.1-.5-.1-.8-.2-.2-.3-.5-.3-.9 0-.8.6-1.4 1.5-1.4 1 0 1.6.7 1.6 1.8 0 1.7-1 2.9-2.4 2.9-.4 0-.7-.1-1-.3l-.4 1.5-.1.4" fill="none" stroke-width="1.4"></path>
            </svg>
          </a>
          <a href="#" data-href="site_youtube" aria-label="YouTube" title="YouTube" class="social-icon yt">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="7" width="18" height="10" rx="3" ry="3"></rect>
              <polygon points="11 10 15 12 11 14"></polygon>
            </svg>
          </a>
          <a href="contact.html" data-contact-link aria-label="Contact" title="Contact" class="social-icon mail">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="6" width="18" height="12" rx="2" ry="2"></rect>
              <polyline points="4 7 12 12 20 7" fill="none" stroke-width="1.6"></polyline>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="container contact-section">
      <h1 class="contact-title" data-content="title" id="contactPageHeading">Send Us a Message</h1>
      <div id="contactThankYou" style="display:none; text-align:center; padding:2rem 1rem 3rem; max-width:520px; margin:0 auto;">
        <h2 style="font-family:var(--font-heading);font-size:clamp(1.5rem, 4vw, 2rem);margin-bottom:0.75rem;">Thanks for contacting us!</h2>
        <p style="color:var(--text-muted); margin-bottom:1.5rem;">We'll get back to you as soon as we can.</p>
        <button type="button" class="contact-submit" id="contactSendAnother" style="max-width:280px;margin:0 auto;">Send another message</button>
      </div>
      <form class="contact-form" id="contactForm">
        <p id="contactFormError" class="contact-form-error" style="display:none;color:#b33;margin-bottom:1rem;font-size:0.95rem;"></p>
        <div class="form-group">
          <label for="contact-email">Email Address <span class="required">*</span></label>
          <input type="email" id="contact-email" name="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="contact-subject">Subject <span class="required">*</span></label>
          <input type="text" id="contact-subject" name="subject" required maxlength="200" />
        </div>
        <div class="form-group">
          <label for="contact-message">Your Message <span class="required">*</span></label>
          <textarea id="contact-message" name="message" rows="5" required maxlength="10000"></textarea>
        </div>
        <button type="submit" class="contact-submit" id="contactSubmitBtn">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <div class="footer-nav-rows">
          <p class="footer-line footer-line-row1">
            <span class="footer-dpref">
              <a href="index.html">Home</a><span class="footer-sep">|</span>
            </span>
            <span class="footer-dmain">
              <a href="gallery.html">Cake Gallery</a><span class="footer-sep">|</span><a href="blog.html">Share</a>
            </span>
          </p>
          <p class="footer-line footer-line-row2">
            <span class="footer-dpref footer-dpref--spacer" aria-hidden="true"></span>
            <span class="footer-dmain">
              <a href="about.html">About</a><span class="footer-sep">|</span><a href="contact.html">Contact</a>
            </span>
          </p>
        </div>
      </div>
      <div class="footer-center">
        <a class="footer-logo" href="index.html" aria-label="Beiai Baking home">
          <img class="footer-logo-img" src="assets/images/logo.png" alt="Beiai Baking" />
        </a>
      </div>
      <div class="footer-right">
        <p class="footer-line">© <span id="year"></span> Beiai Baking. All rights reserved.</p>
        <p class="footer-line footer-line-indent">
          <a href="privacy-policy.html">Privacy Policy</a>
          <span class="footer-sep">|</span>
          <a href="terms-of-use.html">Terms of Use</a>
        </p>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/cms.js"></script>
  <script>
  (function () {
    var form = document.getElementById('contactForm');
    var thankYou = document.getElementById('contactThankYou');
    var errEl = document.getElementById('contactFormError');
    var submitBtn = document.getElementById('contactSubmitBtn');
    var heading = document.getElementById('contactPageHeading');
    if (!form) return;

    function showError(msg) {
      errEl.textContent = msg || '';
      errEl.style.display = msg ? 'block' : 'none';
    }

    function showThankYou() {
      form.style.display = 'none';
      if (heading) heading.style.display = 'none';
      thankYou.style.display = 'block';
      thankYou.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetToForm() {
      thankYou.style.display = 'none';
      if (heading) heading.style.display = '';
      form.style.display = '';
      showError('');
      form.reset();
    }

    document.getElementById('contactSendAnother').addEventListener('click', resetToForm);

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      showError('');
      var payload = {
        email: document.getElementById('contact-email').value.trim(),
        subject: document.getElementById('contact-subject').value.trim(),
        message: document.getElementById('contact-message').value.trim(),
      };
      if (!payload.email || !payload.subject || !payload.message) return;

      submitBtn.disabled = true;
      var prevText = submitBtn.textContent;
      submitBtn.textContent = 'Sending…';

      fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      })
        .then(function (r) {
          return r.text().then(function (text) {
            var data = {};
            if (text) {
              try {
                data = JSON.parse(text);
              } catch (e) {
                data = {
                  error:
                    'Server error (HTTP ' +
                    r.status +
                    ') with a non-JSON page. Open Vercel → your deployment → Functions → Logs for /api/contact. Redeploy after changing env vars.',
                };
              }
            }
            return { ok: r.ok, status: r.status, data: data };
          });
        })
        .then(function (res) {
          if (res.ok && res.data.success) {
            showThankYou();
          } else {
            var msg = (res.data && res.data.error) || 'Something went wrong. Please try again or email us from the header icon.';
            if (res.status === 404) {
              msg =
                'Contact API not found (404). Deploy the latest code from GitHub, then Redeploy on Vercel.';
            }
            if (res.status === 503) {
              msg = 'Contact form is not set up yet. Please email us using the mail icon in the site header.';
            }
            showError(msg);
          }
        })
        .catch(function (err) {
          showError(
            (err && err.message) ||
              'Could not reach the server. Check your connection, or try again after redeploying on Vercel.'
          );
        })
        .then(function () {
          submitBtn.disabled = false;
          submitBtn.textContent = prevText;
        });
    });
  })();
  </script>
</body>
</html>
