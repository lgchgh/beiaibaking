  <script src="assets/js/main.js"></script>
  <script src="assets/js/cms.js"></script>
  <script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    var id = params.get('id');
    var typeFromUrl = params.get('type');
    var loading = document.getElementById('postLoading');
    var content = document.getElementById('postContent');
    var error = document.getElementById('postError');
    var backLink = document.getElementById('postBackLink');

    function validShareType(t) {
      return ['news', 'recipe', 'blog'].indexOf(String(t || '').toLowerCase()) >= 0;
    }

    function applyBackLink(t) {
      var type = String(t || '').toLowerCase();
      var labels = { news: 'Back to News', recipe: 'Back to Recipes', blog: 'Back to Blog' };
      if (labels[type]) {
        backLink.setAttribute('href', 'blog.html?type=' + encodeURIComponent(type));
        backLink.textContent = '← ' + labels[type];
      } else {
        backLink.setAttribute('href', 'blog.html');
        backLink.textContent = '← Back to Share';
      }
    }

    if (validShareType(typeFromUrl)) applyBackLink(typeFromUrl);

    if (!slug && !id) {
      loading.style.display = 'none';
      error.style.display = 'block';
      return;
    }

    var url = '/api/posts/' + (id || encodeURIComponent(slug));
    fetch(url)
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(post) {
        loading.style.display = 'none';
        if (post) {
          if (!validShareType(typeFromUrl)) applyBackLink(post.type);
          var SITE = 'https://www.beiaibaking.net';
          var slugParam = post.slug || slug || '';
          var typeParam = (post.type || typeFromUrl || 'blog').toLowerCase();
          if (!validShareType(typeParam)) typeParam = 'blog';
          var pageUrl = SITE + '/post.html?slug=' + encodeURIComponent(slugParam) + '&type=' + encodeURIComponent(typeParam);
          function setMetaProp(p, v) {
            var m = document.querySelector('meta[property="' + p + '"]');
            if (m) m.setAttribute('content', v);
          }
          function setMetaName(n, v) {
            var m = document.querySelector('meta[name="' + n + '"]');
            if (m) m.setAttribute('content', v);
          }
          function stripHtmlToText(html, max) {
            var d = document.createElement('div');
            d.innerHTML = html || '';
            var t = (d.textContent || '').replace(/\s+/g, ' ').trim();
            if (max && t.length > max) t = t.slice(0, max - 1) + '\u2026';
            return t;
          }
          var excerpt = (post.excerpt && String(post.excerpt).trim()) ? String(post.excerpt).trim().slice(0, 160) : '';
          var desc = excerpt || stripHtmlToText(post.content, 160);
          if (!desc) desc = 'Read this post on Beiai Baking: ' + (post.title || 'Share') + '.';
          var titleFull = (post.title || 'Post') + ' | Beiai Baking';
          document.title = titleFull;
          document.getElementById('seo-meta-description').setAttribute('content', desc);
          var can = document.getElementById('seo-canonical');
          if (can) can.setAttribute('href', pageUrl);
          setMetaProp('og:url', pageUrl);
          setMetaProp('og:title', titleFull);
          setMetaProp('og:description', desc);
          var ogImg = (post.cover_image && String(post.cover_image).trim()) ? String(post.cover_image).trim() : SITE + '/assets/images/logo.png';
          if (ogImg.indexOf('http') !== 0 && ogImg.indexOf('//') !== 0) {
            try { ogImg = new URL(ogImg, SITE + '/').href; } catch (e1) { ogImg = SITE + '/assets/images/logo.png'; }
          }
          setMetaProp('og:image', ogImg);
          setMetaName('twitter:title', titleFull);
          setMetaName('twitter:description', desc);
          setMetaName('twitter:image', ogImg);
          var ld = {
            '@context': 'https://schema.org',
            '@type': 'Article',
            headline: post.title || '',
            datePublished: post.published_at || post.created_at || undefined,
            dateModified: post.updated_at || post.published_at || post.created_at || undefined,
            author: { '@type': 'Organization', name: 'Beiai Baking' },
            publisher: { '@type': 'Organization', name: 'Beiai Baking', logo: { '@type': 'ImageObject', url: SITE + '/assets/images/logo.png' } },
            mainEntityOfPage: { '@type': 'WebPage', '@id': pageUrl },
            image: ogImg
          };
          var ldEl = document.getElementById('seo-article-jsonld');
          if (!ldEl) {
            ldEl = document.createElement('script');
            ldEl.type = 'application/ld+json';
            ldEl.id = 'seo-article-jsonld';
            document.head.appendChild(ldEl);
          }
          ldEl.textContent = JSON.stringify(ld);
          document.getElementById('postTitle').textContent = post.title || '';
          document.getElementById('postDate').textContent = (post.published_at || post.created_at) ? new Date(post.published_at || post.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
          var bodyEl = document.getElementById('postBody');
          bodyEl.innerHTML = post.content || '';
          // Third-party hotlinking: some hosts block requests with a foreign Referer; Google is often unreachable in some regions.
          bodyEl.querySelectorAll('img').forEach(function (img) {
            var raw = img.getAttribute('src');
            if (!raw) return;
            try {
              var u = new URL(raw, window.location.href);
              if (u.origin !== window.location.origin) {
                img.setAttribute('referrerpolicy', 'no-referrer');
              }
            } catch (e) { /* ignore */ }
          });
          content.style.display = 'block';
        } else {
          error.style.display = 'block';
        }
      })
      .catch(function() {
        loading.style.display = 'none';
        error.style.display = 'block';
      });
  })();
  </script>
