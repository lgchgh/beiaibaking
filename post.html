<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Post | Beiai Baking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/images/logo.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/assets/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .post-body { max-width: 720px; margin: 0 auto; padding: 2rem 0 4rem; }
    .post-body h1, .post-body h2, .post-body h3 { margin-top: 1.5rem; }
    .post-body p { margin-bottom: 1rem; }
    .post-body img { max-width: 100%; height: auto; border-radius: var(--border-radius); margin: 1rem 0; }
    .post-back { margin-bottom: 1.5rem; font-size: 0.9rem; }
    .post-back a { color: var(--primary-color); }
    .post-date { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html" aria-label="Beiai Baking home">
        <img class="logo-img" src="assets/images/logo.png" alt="Beiai Baking logo" />
        <span class="logo-text">Beiai Baking</span>
      </a>
      <div class="header-right">
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="gallery.html">Cake Gallery</a>
          <a href="blog.html">Share</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="nav-social" aria-label="Social media links">
          <a href="#" data-href="site_instagram" aria-label="Instagram" title="Instagram" class="social-icon insta">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.2" cy="6.8" r="1.2"></circle></svg>
          </a>
          <a href="#" data-href="site_pinterest" aria-label="Pinterest" title="Pinterest" class="social-icon pin">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 7.5c-2 0-3.5 1.4-3.5 3.4 0 1.4.8 2.3 2 2.3.4 0 .8-.2.9-.6l.3-1.1c.1-.4.1-.5-.1-.8-.2-.2-.3-.5-.3-.9 0-.8.6-1.4 1.5-1.4 1 0 1.6.7 1.6 1.8 0 1.7-1 2.9-2.4 2.9-.4 0-.7-.1-1-.3l-.4 1.5-.1.4" fill="none" stroke-width="1.4"></path></svg>
          </a>
          <a href="#" data-href="site_youtube" aria-label="YouTube" title="YouTube" class="social-icon yt">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="7" width="18" height="10" rx="3" ry="3"></rect><polygon points="11 10 15 12 11 14"></polygon></svg>
          </a>
          <a href="mailto:contact@beiaibaking.com" data-mailto="site_email" aria-label="Email" title="Email" class="social-icon mail">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="2" ry="2"></rect><polyline points="4 7 12 12 20 7" fill="none" stroke-width="1.6"></polyline></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="container" style="padding: 48px 2rem 24px;">
      <div class="post-back"><a id="postBackLink" href="blog.html">← Back to Share</a></div>
      <div id="postContainer">
        <p id="postLoading">Loading...</p>
        <div id="postContent" style="display:none">
          <h1 id="postTitle"></h1>
          <p class="post-date" id="postDate"></p>
          <div class="post-body" id="postBody"></div>
        </div>
        <p id="postError" style="display:none; color: var(--text-muted);">Post not found.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p class="footer-line">
          <a href="index.html">Home</a>
          <span class="footer-sep">|</span>
          <a href="gallery.html">Cake Gallery</a>
          <span class="footer-sep">|</span>
          <a href="blog.html">Share</a>
          <span class="footer-sep">|</span>
          <a href="about.html">About</a>
          <span class="footer-sep">|</span>
          <a href="contact.html">Contact</a>
        </p>
      </div>
      <div class="footer-center">
        <a class="footer-logo" href="index.html" aria-label="Beiai Baking home">
          <img class="footer-logo-img" src="assets/images/logo.png" alt="Beiai Baking" />
        </a>
      </div>
      <div class="footer-right">
        <p class="footer-line">© <span id="year"></span> Beiai Baking. All rights reserved.</p>
        <p class="footer-line footer-line-indent">
          <a href="privacy-policy.html">Privacy Policy</a>
          <span class="footer-sep">|</span>
          <a href="terms-of-use.html">Terms of Use</a>
        </p>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/cms.js"></script>
  <script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    var id = params.get('id');
    var typeFromUrl = params.get('type');
    var loading = document.getElementById('postLoading');
    var content = document.getElementById('postContent');
    var error = document.getElementById('postError');
    var backLink = document.getElementById('postBackLink');

    function validShareType(t) {
      return ['news', 'recipe', 'blog'].indexOf(String(t || '').toLowerCase()) >= 0;
    }

    function applyBackLink(t) {
      var type = String(t || '').toLowerCase();
      var labels = { news: 'Back to News', recipe: 'Back to Recipes', blog: 'Back to Blog' };
      if (labels[type]) {
        backLink.setAttribute('href', 'blog.html?type=' + encodeURIComponent(type));
        backLink.textContent = '← ' + labels[type];
      } else {
        backLink.setAttribute('href', 'blog.html');
        backLink.textContent = '← Back to Share';
      }
    }

    if (validShareType(typeFromUrl)) applyBackLink(typeFromUrl);

    if (!slug && !id) {
      loading.style.display = 'none';
      error.style.display = 'block';
      return;
    }

    var url = '/api/posts/' + (id || encodeURIComponent(slug));
    fetch(url)
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(post) {
        loading.style.display = 'none';
        if (post) {
          if (!validShareType(typeFromUrl)) applyBackLink(post.type);
          document.title = (post.title || 'Post') + ' | Beiai Baking';
          document.getElementById('postTitle').textContent = post.title || '';
          document.getElementById('postDate').textContent = post.created_at ? new Date(post.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
          var bodyEl = document.getElementById('postBody');
          bodyEl.innerHTML = post.content || '';
          // Third-party hotlinking: some hosts block requests with a foreign Referer; Google is often unreachable in some regions.
          bodyEl.querySelectorAll('img').forEach(function (img) {
            var raw = img.getAttribute('src');
            if (!raw) return;
            try {
              var u = new URL(raw, window.location.href);
              if (u.origin !== window.location.origin) {
                img.setAttribute('referrerpolicy', 'no-referrer');
              }
            } catch (e) { /* ignore */ }
          });
          content.style.display = 'block';
        } else {
          error.style.display = 'block';
        }
      })
      .catch(function() {
        loading.style.display = 'none';
        error.style.display = 'block';
      });
  })();
  </script>
</body>
</html>
